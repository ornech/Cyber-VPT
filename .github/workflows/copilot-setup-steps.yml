name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/copilot-instructions.md
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/copilot-instructions.md

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Basic repository inventory
        shell: bash
        run: |
          echo "Root files:"
          ls -la
          echo
          echo ".github tree if present:"
          find .github -maxdepth 3 -type f 2>/dev/null | sort || true

      - name: Set up Python only if needed
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies if requirements.txt exists
        if: ${{ hashFiles('requirements.txt') != '' }}
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install package if pyproject.toml exists
        if: ${{ hashFiles('pyproject.toml') != '' }}
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run tests only if tests exist
        if: ${{ hashFiles('tests/**/*.py') != '' }}
        shell: bash
        run: |
          python -m pip install pytest
          pytest -q

      - name: Check core documentation files
        shell: bash
        run: |
          for f in README.md TODO.md lexique.md; do
            if [ -f "$f" ]; then
              echo "FOUND $f"
            else
              echo "MISSING $f"
            fi
          done

      - name: Finish without failing on absent code stack
        shell: bash
        run: |
          echo "Copilot setup completed."